<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    
    <title>Kaylyn | Photography</title>
    <meta name="description" content="Photography by Kaylyn.">
    
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.4.1/css/all.css" integrity="sha384-5sAR7xN1Nv6T6+dT2mhtzEpVJvfS3NScPQTrOxhwjIuvcA67KV2R5Jz6kr4abQsz" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="grid-2">
        <header class="section-1">
            <img src="assets/profile.png" alt="Profile Picture" class="profile-pic">
            
            <h1>kaylyn</h1>
            <p>she/her</p>
            
            <a href="https://discord.com/users/1333581841583706175" target="_blank" rel="noopener noreferrer" aria-label="Visit my Discord"><i class="fab fa-discord"></i></a>
            <a href="https://www.youtube.com/@kaylynxo" target="_blank" rel="noopener noreferrer" aria-label="Visit my YouTube Channel"><i class="fab fa-youtube"></i></a>
            <a href="#" target="_blank" rel="noopener noreferrer" aria-label="View my GitHub Profile"><i class="fab fa-github"></i></a>
        </header>
        
        <main class="section-2">
            <section>
                <h2>photography</h2>
                <p>just some shots of nature, lakes, and urban architecture.</p>
                
                <div class="gallery-grid">
                    <div class="gallery-item">
                        <img src="ingame-pics/sadicey.png" alt="Sad Icey">
                    </div>
                    <div class="gallery-item">
                        <img src="ingame-pics/photo2.png" alt="Nature / Architecture shot">
                    </div>
                    <div class="gallery-item">
                        <img src="ingame-pics/photo3.png" alt="Nature / Architecture shot">
                    </div>
                    <div class="gallery-item">
                        <img src="ingame-pics/photo4.png" alt="Nature / Architecture shot">
                    </div>
                </div>
            </section>
            
            <section>
                <h2>links</h2>
                <a href="index.html" style="width: 130px;">⬅ back home</a>
            </section>
        </main>
    </div>

    <div id="lightbox" class="lightbox" aria-hidden="true">
        <button class="lightbox-close" aria-label="Close lightbox">&times;</button>
        <img class="lightbox-content" src="" alt="Enlarged view">
    </div>

    <script>
        const galleryImages = document.querySelectorAll('.gallery-item img');
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = lightbox.querySelector('.lightbox-content');
        const lightboxClose = lightbox.querySelector('.lightbox-close');

        galleryImages.forEach(img => {
            img.addEventListener('click', () => {
                lightboxImg.src = img.src;
                lightboxImg.alt = img.alt;
                lightbox.classList.add('active');
                lightbox.setAttribute('aria-hidden', 'false');
            });
        });

        const closeLightbox = () => {
            lightbox.classList.remove('active');
            lightbox.setAttribute('aria-hidden', 'true');
            lightboxImg.src = '';
        };

        lightboxClose.addEventListener('click', closeLightbox);
        lightbox.addEventListener('click', (e) => {
            if (e.target === lightbox) {
                closeLightbox();
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && lightbox.classList.contains('active')) {
                closeLightbox();
            }
        });
    </script>
</body>
</html>
